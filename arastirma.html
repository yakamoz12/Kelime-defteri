<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Araştırma Asistanı">
<meta name="theme-color" content="#eef1f4" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#10131a" media="(prefers-color-scheme: dark)">
<title>Araştırma Asistanı</title>
<link rel="manifest" id="manifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eef1f4;--bg2:#f7f9fb;--card:#ffffff;--ink:#161a22;--soft:#5f6b80;
  --line:#e2e7ee;--line2:#eef2f6;--accent:#0d7d8a;--accent-d:#0a626c;
  --good:#2f8f6b;--good-bg:#e6f3ed;--warn:#b06a2c;--tag-bg:#e8f3f4;
  --shadow:0 1px 2px rgba(20,30,50,.04),0 8px 24px rgba(20,30,50,.06);
  --shadow-lg:0 14px 44px rgba(20,30,50,.16);--radius:16px;--nav-h:64px;
}
[data-theme="dark"]{
  --bg:#10131a;--bg2:#161a22;--card:#1b2029;--ink:#e9edf4;--soft:#9aa6ba;
  --line:#2a313d;--line2:#222833;--accent:#27aab8;--accent-d:#1f8d99;
  --good:#5bb08c;--good-bg:#1e2d28;--warn:#d2924f;--tag-bg:#1d2730;
  --shadow:0 1px 2px rgba(0,0,0,.25),0 10px 30px rgba(0,0,0,.4);
  --shadow-lg:0 16px 50px rgba(0,0,0,.55);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:"Hanken Grotesk",system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;min-height:100dvh;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
h1,h2,h3,.disp{font-family:"Fraunces",Georgia,serif;font-optical-sizing:auto}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit;font-size:16px;color:inherit}
#app{max-width:600px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}

header{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--bg) 85%,transparent);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:calc(env(safe-area-inset-top) + 14px) 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line2)}
.brand h1{font-size:1.34rem;font-weight:600;margin:0;letter-spacing:-.01em}
.brand p{margin:1px 0 0;font-size:.7rem;color:var(--soft);letter-spacing:.13em;text-transform:uppercase;font-weight:600}
.hbtns{display:flex;gap:8px}
.icon-btn{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;background:var(--bg2);border:1px solid var(--line);color:var(--ink);transition:.16s}
.icon-btn:active{transform:scale(.92)}
.icon-btn svg{width:19px;height:19px}

main{flex:1;padding:16px 16px calc(var(--nav-h) + env(safe-area-inset-bottom) + 26px)}
.screen{display:none;animation:fade .35s ease}
.screen.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}

.searchbar{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:0 13px;margin-bottom:14px;box-shadow:var(--shadow)}
.searchbar svg{width:17px;height:17px;color:var(--soft);flex-shrink:0}
.searchbar input{flex:1;border:none;background:none;padding:13px 0;outline:none}
.searchbar input::placeholder{color:var(--soft)}

.chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;margin-bottom:14px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;padding:7px 14px;border-radius:30px;background:var(--bg2);border:1px solid var(--line);font-size:.82rem;font-weight:500;color:var(--soft);transition:.15s}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.chip:active{transform:scale(.95)}

.alist{display:flex;flex-direction:column;gap:11px}
.paper{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;box-shadow:var(--shadow);animation:rise .4s both;position:relative}
@keyframes rise{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:none}}
.paper .ptitle{font-family:"Fraunces",serif;font-size:1.06rem;font-weight:600;line-height:1.32;letter-spacing:-.01em;padding-right:38px;cursor:pointer}
.paper .pmeta{font-size:.76rem;color:var(--accent);font-weight:600;margin-top:7px}
.paper .pabs{font-size:.85rem;color:var(--soft);margin-top:8px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;cursor:pointer}
.savebtn{position:absolute;top:13px;right:13px;width:32px;height:32px;border-radius:9px;display:grid;place-items:center;background:var(--bg2);border:1px solid var(--line);color:var(--soft);transition:.15s}
.savebtn.saved{background:var(--accent);border-color:var(--accent);color:#fff}
.savebtn:active{transform:scale(.9)}
.savebtn svg{width:16px;height:16px}
.ptags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.ptag{font-size:.7rem;font-weight:600;color:var(--accent-d);background:var(--tag-bg);padding:3px 9px;border-radius:20px}

.empty{text-align:center;padding:46px 24px;color:var(--soft)}
.empty .ico{width:58px;height:58px;margin:0 auto 15px;border-radius:17px;display:grid;place-items:center;background:var(--bg2);border:1px solid var(--line)}
.empty .ico svg{width:27px;height:27px;color:var(--accent)}
.empty h3{font-size:1.25rem;color:var(--ink);margin:0 0 7px;font-weight:600}
.empty p{font-size:.92rem;margin:0 auto;max-width:300px}
.spinner{width:34px;height:34px;border-radius:50%;border:3px solid var(--line);border-top-color:var(--accent);animation:spin .8s linear infinite;margin:0 auto 15px}
@keyframes spin{to{transform:rotate(360deg)}}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:12px 17px;border-radius:12px;font-weight:600;font-size:.92rem;transition:.16s}
.btn:active{transform:scale(.97)}
.btn-pri{background:var(--accent);color:#fff;box-shadow:0 6px 18px color-mix(in srgb,var(--accent) 28%,transparent)}
.btn-ghost{background:var(--bg2);border:1px solid var(--line);color:var(--ink)}
.btn svg{width:17px;height:17px}
.btn-block{width:100%}
.btn[disabled]{opacity:.5;pointer-events:none}

/* detail */
.backbtn{display:inline-flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--line);color:var(--ink);border-radius:30px;padding:8px 15px 8px 11px;font-weight:600;font-size:.85rem;margin-bottom:16px}
.backbtn:active{transform:scale(.96)}
.backbtn svg{width:17px;height:17px}
.d-title{font-family:"Fraunces",serif;font-size:1.45rem;font-weight:600;line-height:1.26;letter-spacing:-.01em;margin:0 0 10px}
.d-meta{font-size:.83rem;color:var(--accent);font-weight:600}
.d-auth{font-size:.82rem;color:var(--soft);margin-top:5px;line-height:1.45}
.actrow{display:flex;flex-wrap:wrap;gap:9px;margin:16px 0}
.actrow .btn{padding:10px 14px;font-size:.86rem}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;box-shadow:var(--shadow);margin-bottom:14px}
.card h3{font-size:1.02rem;margin:0 0 11px;font-weight:600;display:flex;align-items:center;gap:8px}
.card h3 svg{width:17px;height:17px;color:var(--accent)}
.sectit{font-family:"Fraunces",serif;font-size:1.05rem;font-weight:600;margin:20px 2px 11px;color:var(--soft)}
.abs{font-size:1.01rem;line-height:1.72}
.abs p{margin:0 0 12px}
.summary{white-space:pre-wrap;font-size:.98rem;line-height:1.66}
.summary.gen{background:var(--good-bg);border-color:color-mix(in srgb,var(--good) 30%,var(--line))}

/* tags editor */
.tagrow{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.tagchip{display:inline-flex;align-items:center;gap:5px;font-size:.76rem;font-weight:600;color:var(--accent-d);background:var(--tag-bg);padding:4px 6px 4px 11px;border-radius:20px}
.tagchip button{width:16px;height:16px;border-radius:50%;display:grid;place-items:center;color:var(--accent-d);opacity:.7}
.tagchip button svg{width:11px;height:11px}
.taginput{flex:1;min-width:90px;border:1.5px dashed var(--line);background:transparent;border-radius:20px;padding:5px 11px;font-size:.8rem;outline:none}
.taginput:focus{border-color:var(--accent)}
.noteta{width:100%;margin-top:11px;padding:11px 13px;border-radius:12px;border:1.5px solid var(--line);background:var(--bg2);outline:none;resize:vertical;min-height:52px;line-height:1.5;font-size:.92rem}
.noteta:focus{border-color:var(--accent)}

/* Q&A */
.qa{display:flex;flex-direction:column;gap:10px;margin-bottom:13px}
.bubble{padding:11px 14px;border-radius:15px;font-size:.94rem;line-height:1.55;max-width:88%;white-space:pre-wrap}
.bubble.q{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:5px}
.bubble.a{align-self:flex-start;background:var(--bg2);border:1px solid var(--line);border-bottom-left-radius:5px}
.qarow{display:flex;gap:9px}
.qarow input{flex:1;min-width:0;padding:12px 14px;border-radius:13px;border:1.5px solid var(--line);background:var(--bg2);outline:none}
.qarow input:focus{border-color:var(--accent)}
.qhint{font-size:.82rem;color:var(--soft);margin-bottom:11px;line-height:1.45}

nav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:color-mix(in srgb,var(--bg) 90%,transparent);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--line2);padding-bottom:env(safe-area-inset-bottom)}
.nav-inner{max-width:600px;margin:0 auto;display:flex;height:var(--nav-h)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--soft);transition:.15s}
.tab svg{width:22px;height:22px}
.tab span{font-size:.69rem;font-weight:600}
.tab.on{color:var(--accent)}

.overlay{position:fixed;inset:0;z-index:50;background:rgba(10,15,25,.45);backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:51;background:var(--bg2);border-radius:24px 24px 0 0;padding:8px 20px calc(env(safe-area-inset-bottom) + 22px);max-width:600px;margin:0 auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,.15,.2,1);max-height:90dvh;overflow-y:auto;box-shadow:0 -10px 40px rgba(0,0,0,.2)}
.sheet.show{transform:translateY(0)}
.grab{width:38px;height:4px;background:var(--line);border-radius:4px;margin:8px auto 14px}
.sheet h2{font-size:1.3rem;margin:0 0 16px;font-weight:600}
.field{margin-bottom:13px}
.field label{display:block;font-size:.8rem;font-weight:600;color:var(--soft);margin-bottom:6px}
.field input{width:100%;padding:13px 14px;border-radius:12px;border:1.5px solid var(--line);background:var(--card);outline:none}
.field input:focus{border-color:var(--accent)}
.sheet-actions{display:flex;gap:10px;margin-top:6px}
.sheet-actions .btn{flex:1}
.menu-item{display:flex;align-items:center;gap:13px;width:100%;padding:14px 8px;border-radius:12px;text-align:left;font-weight:500;font-size:1rem;transition:.12s}
.menu-item:active{background:var(--card)}
.menu-item svg{width:20px;height:20px;color:var(--accent)}
.menu-item .sub{font-size:.78rem;color:var(--soft);font-weight:400}

.toast{position:fixed;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 78px);left:50%;transform:translateX(-50%) translateY(18px);background:var(--ink);color:var(--bg);padding:11px 20px;border-radius:30px;font-size:.88rem;font-weight:500;z-index:60;opacity:0;pointer-events:none;transition:.27s;box-shadow:var(--shadow-lg);white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.dots3{display:inline-flex;gap:5px;align-items:center}
.dots3 i{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.4;animation:bd 1s infinite}
.dots3 i:nth-child(2){animation-delay:.15s}.dots3 i:nth-child(3){animation-delay:.3s}
@keyframes bd{0%,100%{opacity:.4;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}
.oa{display:inline-block;font-size:.68rem;font-weight:700;color:var(--good);background:var(--good-bg);padding:2px 8px;border-radius:20px;margin-left:8px;vertical-align:middle}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand"><h1>Araştırma Asistanı</h1><p>Literatür · Kütüphane · AI</p></div>
    <div class="hbtns">
      <button class="icon-btn" id="themeBtn" aria-label="Tema"></button>
    </div>
  </header>
  <main>
    <section class="screen on" id="s-search"></section>
    <section class="screen" id="s-library"></section>
    <section class="screen" id="s-detail"></section>
    <section class="screen" id="s-settings"></section>
  </main>
  <nav><div class="nav-inner">
    <button class="tab on" data-tab="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <span>Ara</span>
    </button>
    <button class="tab" data-tab="library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span>Kütüphanem</span>
    </button>
    <button class="tab" data-tab="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>Ayarlar</span>
    </button>
  </div></nav>
</div>
<div class="overlay" id="overlay"></div>
<div class="sheet" id="sheet"></div>
<div class="toast" id="toast"></div>
<input type="file" id="importFile" accept="application/json,.json" style="display:none">
<script>
"use strict";
const KEY="arastirma_v1";
let useMem=false;const mem={};
function lsGet(k){if(useMem)return mem[k]??null;try{return localStorage.getItem(k)}catch(e){useMem=true;return mem[k]??null}}
function lsSet(k,v){if(useMem){mem[k]=v;return}try{localStorage.setItem(k,v)}catch(e){useMem=true;mem[k]=v}}
const $=s=>document.querySelector(s);
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
let toastT;function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),2100)}

/* ---- state ---- */
let state;
function importedKey(){try{const r=localStorage.getItem("kelimedefteri_v1");if(r){const o=JSON.parse(r);const k=o&&o.settings&&o.settings.trCfg;if(k&&!/^https?:\/\//i.test(k))return k}}catch(e){}return ""}
function load(){
  const raw=lsGet(KEY);
  if(raw){try{state=JSON.parse(raw)}catch(e){state=null}}
  if(!state||!Array.isArray(state.lib)){
    const prefDark=window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches;
    state={lib:[],settings:{key:importedKey(),theme:prefDark?"dark":"light"}};
    save();
  }
  state.settings=state.settings||{key:"",theme:"light"};
  if(!state.settings.key)state.settings.key=importedKey();
}
function save(){lsSet(KEY,JSON.stringify(state))}

const app={tab:"search",query:"",results:[],loading:false,err:false,detail:null,libTag:"*"};

/* ---- icons ---- */
const I={
  plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
  x:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>',
  back:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>',
  book:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',
  spark:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.6 5.6l2.8 2.8M15.6 15.6l2.8 2.8M18.4 5.6l-2.8 2.8M8.4 15.6l-2.8 2.8"/></svg>',
  chat:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H8l-5 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
  link:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>',
  doc:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h6"/></svg>',
  dl:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5M12 15V3"/></svg>',
  up:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5M12 3v12"/></svg>',
  key:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="4.5"/><path d="m10.5 12.5 8-8M16 6l3 3M19 3l2 2"/></svg>',
  sun:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
  moon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>'
};

/* ---- theme ---- */
function applyTheme(){document.documentElement.setAttribute("data-theme",state.settings.theme);$("#themeBtn").innerHTML=state.settings.theme==="dark"?I.sun:I.moon}

/* ---- Europe PMC ---- */
function jrn(a){return (a.journalInfo&&a.journalInfo.journal&&a.journalInfo.journal.title)||a.journalTitle||""}
function pid(p){return p.pmid||p.pmcid||p.doi||p.title||""}
function isSaved(p){const id=pid(p);return state.lib.some(x=>pid(x)===id)}
function norm(a){return {pmid:a.pmid||"",pmcid:a.pmcid||"",doi:a.doi||"",title:a.title||"Başlıksız",authors:a.authorString||"",journal:jrn(a),year:a.pubYear||"",abstract:a.abstractText||"",oa:!!(a.pmcid&&a.inEPMC==="Y")}}
async function searchPubMed(q){
  app.loading=true;app.err=false;app.query=q;renderSearch();
  try{
    const u="https://www.ebi.ac.uk/europepmc/webservices/rest/search?query="+encodeURIComponent(q+" AND HAS_ABSTRACT:Y")+"&resultType=core&format=json&pageSize=25";
    const r=await fetch(u);const d=await r.json();
    app.results=((d&&d.resultList&&d.resultList.result)||[]).map(norm);
  }catch(e){app.results=[];app.err=true}
  app.loading=false;renderSearch();
}

/* ---- proxy + full text ---- */
async function fetchPage(url){
  const enc=encodeURIComponent(url);
  const tries=["https://api.codetabs.com/v1/proxy/?quest="+enc,"https://api.allorigins.win/raw?url="+enc];
  for(const u of tries){try{const r=await fetch(u);if(r.ok){const t=await r.text();if(t&&t.length>200)return t}}catch(e){}}
  try{const r=await fetch("https://api.allorigins.win/get?url="+enc);if(r.ok){const d=await r.json();if(d&&d.contents)return d.contents}}catch(e){}
  return null;
}
function jatsText(xml){
  try{
    const doc=new DOMParser().parseFromString(xml,"text/xml");const body=doc.querySelector("body");if(!body)return null;
    const out=[];let chars=0;const els=body.querySelectorAll("sec > title, p");
    for(let i=0;i<els.length;i++){if(chars>30000)break;const t=(els[i].textContent||"").replace(/\s+/g," ").trim();if(t&&t.length>1){out.push(t);chars+=t.length}}
    return out.length?out.join("\n\n"):null;
  }catch(e){return null}
}
async function loadFullText(p){
  if(!p.pmcid)return null;
  const u="https://www.ebi.ac.uk/europepmc/webservices/rest/PMC/"+encodeURIComponent(p.pmcid)+"/fullTextXML";
  try{const r=await fetch(u);if(r.ok){const x=await r.text();const t=jatsText(x);if(t)return t}}catch(e){}
  try{const x=await fetchPage(u);if(x){const t=jatsText(x);if(t)return t}}catch(e){}
  return null;
}

/* ---- Gemini ---- */
function getKey(){return (state.settings.key||"").trim()}
async function gemini(prompt,temp){
  const key=getKey();if(!key)return {err:"nokey"};
  try{
    const u="https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key="+encodeURIComponent(key);
    const r=await fetch(u,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:temp==null?0.3:temp}})});
    if(r.ok){const d=await r.json();const c=d&&d.candidates&&d.candidates[0];const out=c&&c.content&&c.content.parts&&c.content.parts[0]&&c.content.parts[0].text;return {text:out?out.trim():null}}
    return {err:"http"};
  }catch(e){return {err:"net"}}
}
function paperContext(p){
  let ctx="Başlık: "+p.title+"\nDergi/Yıl: "+p.journal+" "+p.year+"\n\n";
  if(p.fullText){ctx+="Tam metin:\n"+p.fullText.slice(0,14000)}
  else{ctx+="Özet (abstract):\n"+(p.abstract||"(özet yok)")}
  return ctx;
}

/* ---- navigation ---- */
function setTab(t){app.tab=t;app.detail=null;document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("on",x.dataset.tab===t));show(t);window.scrollTo(0,0)}
function show(name){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("on"));$("#s-"+name).classList.add("on");
  if(name==="search")renderSearch();else if(name==="library")renderLibrary();else if(name==="settings")renderSettings();else if(name==="detail")renderDetail();}
function openPaper(p){
  const saved=state.lib.find(x=>pid(x)===pid(p));
  app.detail=saved?saved:Object.assign({},p,{tags:[],note:"",summary:"",qa:[]});
  if(!app.detail.qa)app.detail.qa=[];if(!app.detail.tags)app.detail.tags=[];
  show("detail");window.scrollTo(0,0);
}

/* ---- render: search ---- */
function paperCard(p,idx){
  const saved=isSaved(p);
  return '<div class="paper" style="animation-delay:'+Math.min(idx*30,300)+'ms">'+
    '<button class="savebtn '+(saved?"saved":"")+'" data-save="'+idx+'" aria-label="Kaydet">'+(saved?I.check:I.plus)+'</button>'+
    '<div class="ptitle" data-open="'+idx+'">'+esc(p.title)+(p.oa?'<span class="oa">açık erişim</span>':'')+'</div>'+
    '<div class="pmeta">'+esc([p.journal,p.year].filter(Boolean).join(" · "))+'</div>'+
    (p.authors?'<div class="pabs" data-open="'+idx+'" style="-webkit-line-clamp:1;color:var(--soft);font-style:normal">'+esc(p.authors)+'</div>':'')+
    (p.abstract?'<div class="pabs" data-open="'+idx+'">'+esc(p.abstract)+'</div>':'')+
  '</div>';
}
function renderSearch(){
  const root=$("#s-search");
  let body;
  if(app.loading)body='<div class="empty"><div class="spinner"></div><p>Literatür aranıyor…</p></div>';
  else if(app.err)body='<div class="empty"><div class="ico">'+I.doc+'</div><h3>Bağlantı sorunu</h3><p>Arama yapılamadı. İnternetini kontrol edip tekrar dene.</p></div>';
  else if(!app.results.length&&app.query)body='<div class="empty"><p>"'+esc(app.query)+'" için sonuç bulunamadı.</p></div>';
  else if(!app.results.length)body='<div class="empty"><div class="ico">'+I.doc+'</div><h3>Literatür ara</h3><p>Bir konu, hastalık, ilaç ya da yazar ara (İngilizce daha iyi sonuç verir). Europe PMC + PubMed üzerinden milyonlarca makale.</p></div>';
  else body='<div class="alist">'+app.results.map((p,i)=>paperCard(p,i)).join("")+'</div>';
  const mag='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>';
  root.innerHTML='<div class="searchbar">'+mag+'<input id="q" placeholder="Konu / hastalık / yazar ara…" enterkeyhint="search" autocomplete="off" value="'+esc(app.query)+'"></div>'+body;
  const q=$("#q");q.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();q.blur();const v=q.value.trim();if(v)searchPubMed(v)}});
  const al=root.querySelector(".alist");
  if(al)al.addEventListener("click",e=>{
    const s=e.target.closest("[data-save]");if(s){toggleSaveIdx(+s.dataset.save);return}
    const o=e.target.closest("[data-open]");if(o){openPaper(app.results[+o.dataset.open]);return}
  });
}
function toggleSaveIdx(i){
  const p=app.results[i];const id=pid(p);const ix=state.lib.findIndex(x=>pid(x)===id);
  if(ix>=0){state.lib.splice(ix,1);toast("Kütüphaneden kaldırıldı")}
  else{state.lib.unshift(Object.assign({},p,{tags:[],note:"",summary:"",qa:[],addedAt:Date.now()}));toast("Kütüphaneye eklendi ✓")}
  save();renderSearch();
}

/* ---- render: library ---- */
function allTags(){const s=new Set();state.lib.forEach(p=>(p.tags||[]).forEach(t=>s.add(t)));return [...s].sort((a,b)=>a.localeCompare(b,"tr"))}
function renderLibrary(){
  const root=$("#s-library");
  if(!state.lib.length){root.innerHTML='<div class="empty"><div class="ico">'+I.book+'</div><h3>Kütüphanen boş</h3><p>"Ara" sekmesinden makale bulup <b>+</b> ile buraya kaydet. Etiket ve not ekleyebilirsin.</p></div>';return}
  const tags=allTags();
  let arr=state.lib.slice();
  if(app.libTag!=="*")arr=arr.filter(p=>(p.tags||[]).includes(app.libTag));
  let chips='<div class="chips" id="libTags"><button class="chip '+(app.libTag==="*"?"on":"")+'" data-t="*">Tümü ('+state.lib.length+')</button>'+tags.map(t=>'<button class="chip '+(app.libTag===t?"on":"")+'" data-t="'+esc(t)+'">'+esc(t)+'</button>').join("")+'</div>';
  let list=arr.length?'<div class="alist">'+arr.map((p,i)=>{
    const gi=state.lib.indexOf(p);
    return '<div class="paper" style="animation-delay:'+Math.min(i*30,300)+'ms"><div class="ptitle" data-lib="'+gi+'">'+esc(p.title)+(p.oa?'<span class="oa">açık erişim</span>':'')+'</div><div class="pmeta">'+esc([p.journal,p.year].filter(Boolean).join(" · "))+'</div>'+(p.summary?'<div class="pabs" data-lib="'+gi+'" style="font-style:normal">📝 Özet hazır</div>':(p.abstract?'<div class="pabs" data-lib="'+gi+'">'+esc(p.abstract)+'</div>':''))+((p.tags&&p.tags.length)?'<div class="ptags">'+p.tags.map(t=>'<span class="ptag">'+esc(t)+'</span>').join("")+'</div>':'')+'</div>';
  }).join("")+'</div>':'<div class="empty"><p>Bu etikette makale yok.</p></div>';
  root.innerHTML=chips+list;
  const lt=$("#libTags");if(lt)lt.addEventListener("click",e=>{const c=e.target.closest("[data-t]");if(c){app.libTag=c.dataset.t;renderLibrary()}});
  const al=root.querySelector(".alist");if(al)al.addEventListener("click",e=>{const o=e.target.closest("[data-lib]");if(o)openPaper(state.lib[+o.dataset.lib])});
}

/* ---- render: detail ---- */
function renderDetail(){
  const root=$("#s-detail");const p=app.detail;if(!p){setTab(app.tab);return}
  const saved=isSaved(p);
  let absHtml;
  if(p.fullText){absHtml=p.fullText.split(/\n\n+/).map(x=>'<p>'+esc(x)+'</p>').join("")}
  else absHtml='<p>'+esc(p.abstract||"Bu makalenin özeti bulunmuyor.")+'</p>';
  let tagsCard="";
  if(saved){
    tagsCard='<div class="card"><h3>Etiketler & Not</h3><div class="tagrow" id="tagRow">'+
      (p.tags||[]).map((t,i)=>'<span class="tagchip">'+esc(t)+'<button data-rmtag="'+i+'" aria-label="Sil">'+I.x+'</button></span>').join("")+
      '<input class="taginput" id="tagInput" placeholder="+ etiket" enterkeyhint="done"></div>'+
      '<textarea class="noteta" id="noteTa" placeholder="Notların…">'+esc(p.note||"")+'</textarea></div>';
  }
  const sumCard=p.summary?'<div class="card summary gen"><h3>'+I.spark+'AI Özet</h3><div class="summary">'+esc(p.summary)+'</div></div>':"";
  const qaThread=(p.qa||[]).map(t=>'<div class="bubble q">'+esc(t.q)+'</div>'+(t.a===null?'<div class="bubble a"><span class="dots3"><i></i><i></i><i></i></span></div>':'<div class="bubble a">'+esc(t.a)+'</div>')).join("");
  root.innerHTML=
    '<button class="backbtn" id="dBack">'+I.back+' Geri</button>'+
    '<h2 class="d-title">'+esc(p.title)+(p.oa?'<span class="oa">açık erişim</span>':'')+'</h2>'+
    '<div class="d-meta">'+esc([p.journal,p.year].filter(Boolean).join(" · "))+'</div>'+
    (p.authors?'<div class="d-auth">'+esc(p.authors)+'</div>':'')+
    '<div class="actrow">'+
      '<button class="btn '+(saved?"btn-ghost":"btn-pri")+'" id="dSave">'+(saved?I.check+' Kayıtlı':I.plus+' Kütüphaneye ekle')+'</button>'+
      '<button class="btn btn-ghost" id="dSum">'+I.spark+' Özetle</button>'+
      (p.pmcid&&p.oa&&!p.fullText?'<button class="btn btn-ghost" id="dFull">'+I.doc+' Tam metin</button>':'')+
      (p.doi?'<a class="btn btn-ghost" href="https://doi.org/'+esc(p.doi)+'" target="_blank" rel="noopener">'+I.link+' DOI</a>':'')+
    '</div>'+
    tagsCard+sumCard+
    '<div class="card"><h3>'+I.chat+' Makaleye soru sor</h3><div class="qhint">Bu makale hakkında soru yaz; yanıtlar yalnızca makale metnine dayanır.'+(p.fullText?' (tam metin yüklü)':' (özete dayanıyor — daha iyisi için "Tam metin")')+'</div>'+
      '<div class="qa" id="qaThread">'+qaThread+'</div>'+
      '<div class="qarow"><input id="qInput" placeholder="Ör. Çalışmanın örneklem büyüklüğü ne?" enterkeyhint="send"><button class="btn btn-pri" id="qSend">Sor</button></div></div>'+
    '<div class="sectit">'+(p.fullText?"Tam metin":"Özet")+'</div><div class="abs">'+absHtml+'</div>';
  $("#dBack").onclick=()=>{app.detail=null;show(app.tab)};
  $("#dSave").onclick=()=>{toggleSaveDetail()};
  $("#dSum").onclick=()=>{doSummary()};
  if($("#dFull"))$("#dFull").onclick=()=>{doFullText()};
  const qi=$("#qInput"),qs=$("#qSend");
  function sendQ(){const v=qi.value.trim();if(v)askQ(v)}
  qs.onclick=sendQ;qi.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();sendQ()}});
  if(saved){
    const ti=$("#tagInput");
    ti.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();const v=ti.value.trim();if(v){p.tags=p.tags||[];if(!p.tags.includes(v))p.tags.push(v);persistDetail();renderDetail()}}});
    $("#tagRow").addEventListener("click",e=>{const b=e.target.closest("[data-rmtag]");if(b){p.tags.splice(+b.dataset.rmtag,1);persistDetail();renderDetail()}});
    const nt=$("#noteTa");nt.addEventListener("input",()=>{p.note=nt.value;persistDetail()});
  }
}
function persistDetail(){const p=app.detail;const ix=state.lib.findIndex(x=>pid(x)===pid(p));if(ix>=0){state.lib[ix]=p;save()}}
function toggleSaveDetail(){
  const p=app.detail;const ix=state.lib.findIndex(x=>pid(x)===pid(p));
  if(ix>=0){state.lib.splice(ix,1);toast("Kaldırıldı")}
  else{p.tags=p.tags||[];p.note=p.note||"";p.qa=p.qa||[];p.addedAt=Date.now();state.lib.unshift(p);toast("Kütüphaneye eklendi ✓")}
  save();renderDetail();
}
async function doFullText(){
  const p=app.detail;const btn=$("#dFull");if(btn){btn.disabled=true;btn.innerHTML='<span class="dots3"><i></i><i></i><i></i></span>'}
  const t=await loadFullText(p);
  if(t){p.fullText=t;persistDetail();toast("Tam metin yüklendi")}else toast("Tam metin alınamadı");
  renderDetail();window.scrollTo(0,0);
}
async function doSummary(){
  const p=app.detail;
  if(!getKey()){toast("Ayarlar'dan Gemini anahtarı gir");setTab("settings");return}
  const btn=$("#dSum");if(btn){btn.disabled=true;btn.innerHTML='<span class="dots3"><i></i><i></i><i></i></span> Özetleniyor'}
  const prompt="Aşağıdaki biyomedikal makaleyi bir araştırmacı için Türkçe özetle. Şu başlıkları kullan ve her birini kısa ve net yaz:\nAmaç:\nYöntem:\nBulgular:\nSonuç:\nKısıtlılıklar:\n\n"+paperContext(p);
  const res=await gemini(prompt,0.25);
  if(res.text){p.summary=res.text;persistDetail()}
  else toast(res.err==="nokey"?"Anahtar gir":"Özet alınamadı, tekrar dene");
  renderDetail();
}
async function askQ(q){
  const p=app.detail;
  if(!getKey()){toast("Ayarlar'dan Gemini anahtarı gir");setTab("settings");return}
  p.qa=p.qa||[];p.qa.push({q:q,a:null});persistDetail();renderDetail();
  const sc=$("#qaThread");if(sc)sc.scrollIntoView({block:"end"});
  let hist="";p.qa.slice(0,-1).forEach(t=>{if(t.a)hist+="Soru: "+t.q+"\nYanıt: "+t.a+"\n"});
  const prompt="Sen bir araştırma asistanısın. SADECE aşağıdaki makaleye dayanarak kullanıcının sorusunu Türkçe, doğru ve net yanıtla. Cevap makalede yoksa 'Makalede bu bilgi yok' de.\n\n=== MAKALE ===\n"+paperContext(p)+"\n\n"+(hist?"=== ÖNCEKİ ===\n"+hist+"\n":"")+"=== SORU ===\n"+q;
  const res=await gemini(prompt,0.2);
  p.qa[p.qa.length-1].a=res.text||(res.err==="nokey"?"Anahtar gerekli.":"Yanıt alınamadı, tekrar dene.");
  persistDetail();renderDetail();
}

/* ---- render: settings ---- */
function renderSettings(){
  const root=$("#s-settings");
  const k=getKey();
  root.innerHTML=
    '<div class="card"><h3>'+I.key+' Gemini API anahtarı</h3>'+
    '<div class="qhint">Özet ve soru-cevap için gerekli. Ücretsiz anahtar: aistudio.google.com/app/apikey. Anahtar yalnızca bu cihazda saklanır. Faturalandırmayı açma.</div>'+
    '<div class="field"><input id="keyInput" value="'+esc(k)+'" placeholder="AIza…" autocapitalize="none" autocomplete="off"></div>'+
    '<button class="btn btn-ghost btn-block" id="keyTest" style="margin-bottom:10px">Test et</button><div id="keyOut" style="font-size:.9rem;font-weight:500;min-height:20px;margin-bottom:12px"></div>'+
    '<button class="btn btn-pri btn-block" id="keySave">Kaydet</button></div>'+
    '<div class="card"><h3>'+I.book+' Kütüphane</h3><div class="qhint">'+state.lib.length+' makale kayıtlı. Yedeklemek veya başka cihaza taşımak için dışa/içe aktar.</div>'+
    '<button class="menu-item" id="mExport">'+I.dl+'<div>Dışa aktar (yedekle)</div></button>'+
    '<button class="menu-item" id="mImport">'+I.up+'<div>İçe aktar</div></button></div>';
  $("#keySave").onclick=()=>{state.settings.key=$("#keyInput").value.trim();save();toast(state.settings.key?"Anahtar kaydedildi ✓":"Anahtar temizlendi")};
  $("#keyTest").onclick=async()=>{
    const v=$("#keyInput").value.trim();const out=$("#keyOut");
    if(!v){out.style.color="var(--warn)";out.textContent="Önce anahtar gir.";return}
    out.style.color="var(--soft)";out.innerHTML='<span class="dots3"><i></i><i></i><i></i></span>';
    const saved=state.settings.key;state.settings.key=v;
    const res=await gemini("Yanıt olarak sadece 'OK' yaz.",0);
    state.settings.key=saved;
    if(res.text){out.style.color="var(--good)";out.textContent="✓ Çalışıyor"}
    else{out.style.color="var(--warn)";out.textContent="✗ Yanıt yok. Anahtar yanlış olabilir ya da tarayıcı doğrudan erişimi engelliyor olabilir."}
  };
  $("#mExport").onclick=exportLib;
  $("#mImport").onclick=()=>$("#importFile").click();
}
function exportLib(){
  const blob=new Blob([JSON.stringify({app:"arastirma-asistani",version:1,exportedAt:new Date().toISOString(),lib:state.lib},null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="kutuphane-yedek.json";document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);toast("Yedek indirildi");
}
$("#importFile").addEventListener("change",e=>{
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);const inc=Array.isArray(d)?d:d.lib;if(!Array.isArray(inc))throw 0;
    const seen=new Set(state.lib.map(x=>pid(x)));let n=0;
    inc.forEach(x=>{if(!x||!x.title)return;const id=pid(x);if(seen.has(id))return;seen.add(id);x.tags=x.tags||[];x.qa=x.qa||[];state.lib.push(x);n++});
    save();toast(n?n+" makale eklendi":"Yeni makale yok");renderSettings();renderLibrary();
  }catch(err){toast("Dosya okunamadı")}e.target.value="";};
  r.readAsText(f);
});
